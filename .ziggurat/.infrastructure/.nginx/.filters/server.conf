# ==============================================================================
#    [Ziggurat OS] .NET 10.0 BACKEND INGRESS VHOST SPECIFICATION (v1476)
#    Path: /layers/services/document-service/.ziggurat/.infrastructure/.nginx/.filters/server.conf
# ==============================================================================

server {
    listen 80;
    server_name document-service.ziggurat.ae;
    
    # Автоматический сквозной редирект на защищенный HTTPS-волновод (без envsubst-клинча)
    return 301 https://${host}${request_uri};
}

server {
    listen 443 ssl;
    server_name document-service.ziggurat.ae;

    # Ссылки на наш триумфальный Wildcard SSL-сейф Трона
    ssl_certificate /etc/nginx/ssl/ziggurat.crt;
    ssl_certificate_key /etc/nginx/ssl/ziggurat.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    location / {
        # СHАЙПЕРСКИЙ ПРОБОЙ ПОРТА v1476: Гвоздями прибиваем proxy_pass к non-root порту 8080!
        proxy_pass http://ziggurat-document-service:8080;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Полная поддержка WebSocket и HTTP/1.1 для живого интерактива Bruno
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
