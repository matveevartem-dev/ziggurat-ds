# ==============================================================================
#    [Ziggurat OS] .NET 10.0 BACKEND INGRESS VHOST SPECIFICATION (v1476)
#    Path: /layers/services/ds/.ziggurat/.infrastructure/.nginx/.filters/server.conf
# ==============================================================================

server {
    listen 80;
    server_name ds.ziggurat.ae; # Короткий, зрячий домен Трона!
    return 301 https://${host}${request_uri};
}

server {
    listen 443 ssl;
    server_name ds.ziggurat.ae;

    ssl_certificate /etc/nginx/ssl/ziggurat.crt;
    ssl_certificate_key /etc/nginx/ssl/ziggurat.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        # Ингресс шлет пакеты на короткое внутреннее имя контейнера!
        proxy_pass http://ziggurat-ds:8080;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
