# layers/services/ds/docker-compose.yml
name: ${COMPOSE_PROJECT_NAME:-ziggurat-os}
services:
  ds:
    build:
      dockerfile: ${PWD}/layers/services/ds/Dockerfile
      context: ${PWD}/layers/services/ds
    container_name: ziggurat-ds
    restart: always
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - ${DS_PORT:-8000}:8080
    volumes:
      - ${PWD}/volumes/shared-documents:/shared
      - ${PWD}/volumes/shared-documents/legacy-volume-uploads:/app/backend/web/uploads
    networks:
      - ziggurat-net

networks:
  ziggurat-net:
    name: ziggurat-net
